<!DOCTYPE html>
<link rel="stylesheet" href="style.css">
    <!-- Math.js for high-precision and symbolic math -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.8.0/math.js"></script>


    <div class="calculator">
        <div class="screen">
            <div id="history"></div>
            <div id="display">0</div>
        </div>
        <div class="keypad">
            <!-- Row 1: Scientific Functions -->
            <button class="btn shift" onclick="toggleShift()">SHIFT</button>
            <button class="btn mode" onclick="setMode()">MODE</button>
            <button class="btn func" onclick="input('sin(')">sin</button>
            <button class="btn func" onclick="input('cos(')">cos</button>
            <button class="btn func" onclick="input('tan(')">tan</button>
            <button class="btn func" onclick="input('(')">(</button>
            <button class="btn func" onclick="input(')')">)</button>
            
            <!-- Row 2: Powers & Roots -->
            <button class="btn func" onclick="input('^2')">x²</button>
            <button class="btn func" onclick="input('^')">xʸ</button>
            <button class="btn func" onclick="input('log10(')">log</button>
            <button class="btn func" onclick="input('ln(')">ln</button>
            <button class="btn func" onclick="input('sqrt(')">√</button>

            <!-- Row 3: Standard Pad -->
            <button class="btn" onclick="input('7')">7</button>
            <button class="btn" onclick="input('8')">8</button>
            <button class="btn" onclick="input('9')">9</button>
            <button class="btn delete" onclick="backspace()">DEL</button>
            <button class="btn clear" onclick="clearScreen()">AC</button>

            <button class="btn" onclick="input('4')">4</button>
            <button class="btn" onclick="input('5')">5</button>
            <button class="btn" onclick="input('6')">6</button>
            <button class="btn" onclick="input('*')">×</button>
            <button class="btn" onclick="input('/')">÷</button>

            <button class="btn" onclick="input('1')">1</button>
            <button class="btn" onclick="input('2')">2</button>
            <button class="btn" onclick="input('3')">3</button>
            <button class="btn" onclick="input('+')">+</button>
            <button class="btn" onclick="input('-')">-</button>

            <button class="btn" onclick="input('0')">0</button>
            <button class="btn" onclick="input('.')">.</button>
            <button class="btn" onclick="input('pi')">π</button>
            <button class="btn" onclick="input('ans')">Ans</button>
            <button class="btn equal" onclick="calculate()">=</button>
        </div>
        <div class="modes">
           <button class="btn mode-btn active" id="decMode" onclick="switchBase('DEC')">DEC</button>
           <button class="btn mode-btn" id="binMode" onclick="switchBase('BIN')">BIN</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
